# ============================================================================
# CI - 持续集成工作流（最终整合版 + 权限修复）
# 触发：push 到 main/master/develop + Pull Request
# 策略：PR 只跑快速检查，重型任务（仪器测试、截图、Token 同步）仅 push 时执行
# 优化：单元测试与覆盖率合并，避免重复执行
# 修复：所有 Job 显式修复 gradlew 可执行权限
# ============================================================================

name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: 编译检查（快速失败）
  # ---------------------------------------------------------------------------
  build:
    name: Build & Compile
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Compile Debug
        run: ./gradlew :app:compileDebugKotlin --no-daemon --stacktrace

      - name: Compile Release
        run: ./gradlew :app:compileReleaseKotlin --no-daemon --stacktrace

  # ---------------------------------------------------------------------------
  # Job 2: 单元测试 + 覆盖率（合并执行，避免重复测试）
  # ---------------------------------------------------------------------------
  unit-test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Unit Tests & Generate Kover Report
        run: ./gradlew :app:testDebugUnitTest :app:koverXmlReport --no-daemon --stacktrace

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 7

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kover-coverage-report
          path: app/build/reports/kover/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Job 3: 代码质量 - ktlint
  # ---------------------------------------------------------------------------
  ktlint:
    name: KtLint Check
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run KtLint
        run: ./gradlew :app:ktlintCheck --no-daemon --stacktrace

      - name: Upload KtLint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ktlint-report
          path: app/build/reports/ktlint/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 4: 代码质量 - detekt
  # ---------------------------------------------------------------------------
  detekt:
    name: Detekt Check
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Detekt
        run: ./gradlew :app:detekt --no-daemon --stacktrace

      - name: Upload Detekt Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: app/build/reports/detekt/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 5: Android Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Android Lint
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Lint
        run: ./gradlew :app:lintDebug --no-daemon --stacktrace

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-*.html
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 6: 仪器化测试（仅 push 时执行）
  # ---------------------------------------------------------------------------
  instrumented-test:
    name: Instrumented Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0777", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Connected Android Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          script: ./gradlew :app:connectedDebugAndroidTest --no-daemon --stacktrace

      - name: Upload Instrumented Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-report
          path: app/build/reports/androidTest/connected/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 7: 架构图检查
  # ---------------------------------------------------------------------------
  arch-graph:
    name: Architecture Graph Check
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Verify architecture graph is up-to-date
        run: |
          chmod +x scripts/arch-graph.sh
          ./scripts/arch-graph.sh --check

  # ---------------------------------------------------------------------------
  # Job 8: 截图测试（Paparazzi，仅 push 时执行）
  # ---------------------------------------------------------------------------
  screenshot-test:
    name: Screenshot Tests (Paparazzi)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-glx libx11-6

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify Screenshots
        run: ./gradlew :app:verifyPaparazziDebug --no-daemon --stacktrace

      - name: Upload Screenshot Diffs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-diffs
          path: app/build/paparazzi/failures/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 9: Figma Token 同步检查（仅 push 时执行）
  # ---------------------------------------------------------------------------
  token-sync:
    name: Figma Token Sync Check
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Style Dictionary
        run: npm install -g style-dictionary

      - name: Verify tokens synced
        run: |
          chmod +x scripts/sync-tokens.sh
          ./scripts/sync-tokens.sh --check

  # ---------------------------------------------------------------------------
  # Job 10: 生产就绪检查
  # ---------------------------------------------------------------------------
  production-check:
    name: Production Readiness Check
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run production readiness check
        run: |
          chmod +x scripts/check-production.sh
          ./scripts/check-production.sh

  # ---------------------------------------------------------------------------
  # Job 11: 构建 APK（验证打包流程）
  # ---------------------------------------------------------------------------
  assemble:
    name: Assemble Debug APK
    runs-on: ubuntu-latest
    needs: [ unit-test, ktlint, detekt, lint, instrumented-test, arch-graph, screenshot-test, token-sync, production-check ]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble Debug
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14