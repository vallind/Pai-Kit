# ============================================================================
# CI - 持续集成工作流（移除 Paparazzi/MockK/Konsist 相关 CI 步骤）
# 触发：push 到 main/master/develop + Pull Request
# 策略：PR 只跑快速检查 + 打包；重型任务（仪器测试、Token 同步）仅 push 时执行
# ============================================================================

name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: 编译检查（快速失败）
  # ---------------------------------------------------------------------------
  build:
    name: Build & Compile
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ ! contains(fromJSON('["main","master"]'), github.ref_name) }}

      - name: Compile Debug
        run: ./gradlew :app:compileDebugKotlin --no-daemon --stacktrace

      - name: Compile Release
        run: ./gradlew :app:compileReleaseKotlin --no-daemon --stacktrace

  # ---------------------------------------------------------------------------
  # Job 2: 单元测试 + 覆盖率（合并执行，避免重复测试）
  # ---------------------------------------------------------------------------
  unit-test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Unit Tests & Generate Kover Report
        run: ./gradlew :app:testDebugUnitTest :app:koverXmlReport --no-daemon --stacktrace

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 3

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kover-coverage-report
          path: app/build/reports/kover/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 3: 代码质量 - ktlint + detekt + Android Lint 合并
  # ---------------------------------------------------------------------------
  code-quality:
    name: Code Quality (ktlint, detekt, lint)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run ktlint
        run: ./gradlew :app:ktlintCheck --no-daemon --stacktrace

      - name: Run detekt
        run: ./gradlew :app:detekt --no-daemon --stacktrace

      - name: Run Android Lint
        run: ./gradlew :app:lintDebug --no-daemon --stacktrace

      - name: Upload ktlint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ktlint-report
          path: |
            app/build/reports/ktlint/**/
            app/build/output/ktlint/
          retention-days: 7

      - name: Upload detekt report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: app/build/reports/detekt/
          retention-days: 3

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-*.html
          retention-days: 3

  # ---------------------------------------------------------------------------
  # Job 4: 脚本检查（架构图 + 生产就绪）合并
  # ---------------------------------------------------------------------------
  scripts-check:
    name: Script Checks (Architecture & Production)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run architecture and production checks
        run: |
          chmod +x scripts/arch-graph.sh scripts/check-production.sh
          ./scripts/arch-graph.sh --check
          ./scripts/check-production.sh

  # ---------------------------------------------------------------------------
  # Job 5: 仪器化测试（仅 push 时执行）
  # ---------------------------------------------------------------------------
  instrumented-test:
    name: Instrumented Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0777", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Connected Android Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          script: ./gradlew :app:connectedDebugAndroidTest --no-daemon --stacktrace

      - name: Upload Instrumented Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-report
          path: app/build/reports/androidTest/connected/
          retention-days: 3

  # ---------------------------------------------------------------------------
  # Job 6: Figma Token 同步检查（仅 push 时执行）
  # ---------------------------------------------------------------------------
  token-sync:
    name: Figma Token Sync Check
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # 项目无 package-lock.json（Android 项目），不启用 npm 缓存

      - name: Install Style Dictionary
        run: npm install -g style-dictionary

      - name: Verify tokens synced
        run: |
          chmod +x scripts/sync-tokens.sh
          ./scripts/sync-tokens.sh --check

  # ---------------------------------------------------------------------------
  # Job 7: 构建 APK（PR 和 push 均执行）
  # ---------------------------------------------------------------------------
  assemble:
    name: Assemble Debug APK
    runs-on: ubuntu-latest
    needs: [ unit-test, code-quality, scripts-check, instrumented-test, token-sync ]
    # 注：screenshot-test 已被移除，故不再依赖
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble Debug
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14