# ============================================================================
# CI - 持续集成工作流
# 触发：push 到 main/master + Pull Request
# 任务：编译检查 + 单元测试 + 代码质量（ktlint + detekt + lint）+ 仪器测试 + 覆盖率
# ============================================================================

name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: 编译检查（快速失败）
  # ---------------------------------------------------------------------------
  build:
    name: Build & Compile
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Compile Debug
        run: ./gradlew :app:compileDebugKotlin --no-daemon --stacktrace

      - name: Compile Release
        run: ./gradlew :app:compileReleaseKotlin --no-daemon --stacktrace

  # ---------------------------------------------------------------------------
  # Job 2: 单元测试
  # ---------------------------------------------------------------------------
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Unit Tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon --stacktrace

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 3: 代码质量 - ktlint
  # ---------------------------------------------------------------------------
  ktlint:
    name: KtLint Check
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run KtLint
        run: ./gradlew :app:ktlintCheck --no-daemon --stacktrace

      - name: Upload KtLint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ktlint-report
          path: app/build/reports/ktlint/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 4: 代码质量 - detekt
  # ---------------------------------------------------------------------------
  detekt:
    name: Detekt Check
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Detekt
        run: ./gradlew :app:detekt --no-daemon --stacktrace

      - name: Upload Detekt Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: app/build/reports/detekt/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 5: Android Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Android Lint
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Lint
        run: ./gradlew :app:lintDebug --no-daemon --stacktrace

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-*.html
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 6: 覆盖率（Kover）
  # ---------------------------------------------------------------------------
  coverage:
    name: Coverage (Kover)
    runs-on: ubuntu-latest
    needs: unit-test
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Kover XML Report
        # Kover 会在 testDebugUnitTest 上插桩；这里再跑一次测试 + 生成报告
        run: ./gradlew :app:testDebugUnitTest :app:koverXmlReport --no-daemon --stacktrace

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kover-coverage-report
          path: app/build/reports/kover/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Job 7: 仪器化测试（Android Emulator）
  # ---------------------------------------------------------------------------
  instrumented-test:
    name: Instrumented Tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0777", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Connected Android Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          script: ./gradlew :app:connectedDebugAndroidTest --no-daemon --stacktrace

      - name: Upload Instrumented Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-report
          path: app/build/reports/androidTest/connected/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 8: 架构图检查（ROADMAP P1-2）
  # ---------------------------------------------------------------------------
  arch-graph:
    name: Architecture Graph Check
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep (fallback)
        # ubuntu-latest ships ripgrep, but install explicitly as a safety net.
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Verify architecture graph is up-to-date
        run: |
          chmod +x scripts/arch-graph.sh
          ./scripts/arch-graph.sh --check

  # ---------------------------------------------------------------------------
  # Job 9: 构建 APK（验证打包流程）
  # ---------------------------------------------------------------------------
  assemble:
    name: Assemble Debug APK
    runs-on: ubuntu-latest
    needs: [ unit-test, ktlint, detekt, lint, coverage, instrumented-test, arch-graph ]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble Debug
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
